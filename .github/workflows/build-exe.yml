name: Build and Release Standalone EXE

on:
  push:
    tags:
      - 'v*' # Triggers whenever a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Data and Matrix
      run: |
        # These scripts generate the necessary files for the EXE
        python Data.py
        python Matrix_init.py

    - name: Build with PyInstaller
      run: |
        # We bundle everything into one standalone file
        pyinstaller --noconsole --onefile --clean `
        --name "Wordle-Strat-Console" `
        --add-data "scientific_word_data.csv;." `
        --add-data "wordle_full_matrix.npy;." `
        GUI.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: dist/Wordle-Strat-Console.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true # Automatically pulls commit messages into the description
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
